<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Detailing Consumables We Use in Oxford & Norfolk Counties | Rosie Dazzlers</title>
  <meta name="description" content="Browse Rosie Dazzlers consumables and products used in mobile detailing across Oxford County and Norfolk County, with stock, ratings, and manufacturer details when available." />
  <link rel="canonical" href="https://rosiedazzlers.ca/consumables" />
  <meta property="og:title" content="Detailing Consumables We Use | Rosie Dazzlers" />
  <meta property="og:description" content="See the detailing chemicals and consumables Rosie Dazzlers uses across Oxford County and Norfolk County." />
  <link rel="stylesheet" href="/assets/site.css?v=20260326d" />
  <style>
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    @media (max-width:1100px){ .grid3{grid-template-columns:repeat(2,1fr)} }
    @media (max-width:980px){ .grid3{grid-template-columns:1fr} }
    .muted{color:rgba(234,242,255,.62)} .mini{font-size:.92rem}
    .cardImg{width:100%;aspect-ratio:16/10;object-fit:contain;border-radius:16px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);padding:10px}
    .tag{display:inline-flex;align-items:center;gap:6px;padding:2px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);font-size:.9rem}
    .inputs input,.inputs select{min-width:180px}
  </style>
</head>
<body>
  <div class="nav"><div class="nav-inner"><a class="brand" href="/"><img data-logo alt="Rosie Dazzlers logo" /><strong>Rosie Dazzlers</strong></a><button class="btn small ghost nav-toggle" id="navToggle" type="button" aria-expanded="false">Menu</button><div class="nav-links" id="navLinks"></div><a class="btn primary" href="/book">Book now</a></div></div>
  <div class="container"><div class="panel"><h1 style="margin:0 0 6px">Consumables</h1><p class="kicker" style="margin:0">Products, chemicals, linens, scrubbers, wash buckets, and consumables we use on mobile detailing jobs in Oxford and Norfolk counties.</p><div class="hr"></div><div class="row inputs" autocomplete="off">
        <input type="text" tabindex="-1" aria-hidden="true" autocomplete="username" style="position:absolute;left:-9999px;opacity:0;pointer-events:none" />
        <input type="password" tabindex="-1" aria-hidden="true" autocomplete="current-password" style="position:absolute;left:-9999px;opacity:0;pointer-events:none" /><input id="q" name="catalog_search" class="search-input search-input-generic" type="text" inputmode="search" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Type to search consumables" aria-label="Search consumables" autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="text" enterkeyhint="search" autocomplete="new-password" name="catalog_keyword_consumables_generic" data-form-type="other" readonly /><select id="cat"><option value="">All categories</option></select><select id="typeFilter"><option value="">All types</option></select><select id="sort"><option value="title_asc">Sort: Title (A→Z)</option><option value="title_desc">Sort: Title (Z→A)</option><option value="category_asc">Sort: Category</option><option value="stock_desc">Sort: Stock (high→low)</option><option value="stock_asc">Sort: Stock (low→high)</option><option value="rating_desc">Sort: Rating</option><option value="vendor_asc">Sort: Vendor</option><option value="custom_asc">Sort: Saved order</option></select><button class="btn ghost" id="clearBtn" type="button">Clear</button></div><div id="status" class="notice" style="display:none;margin-top:12px"></div></div><div class="section"><div id="grid" class="grid3"></div></div><div class="footer" data-footer></div></div>
  <script type="module">
    const DB_URL = "/api/catalog_public?kind=consumable";
    const CANDIDATE_JSON = ["/data/rosie_products_catalog_r2_corrected.json","/data/rosie_products_catalog_rebuilt.json","/data/rosie_products_catalog.json"];
    const R2_PUBLIC_DEV_BASE = "https://pub-3293bca3c49a49a7bd30ea4469874d80.r2.dev";
    const qs=(s)=>document.querySelector(s);
    function escapeHtml(s){return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");}
    function amazonSearchUrl(query){return `https://www.amazon.ca/s?k=${encodeURIComponent((query||'').trim())}`;}
    async function fetchJsonStrict(url){const res=await fetch(url,{cache:'no-store'}); const text=await res.text(); try{return JSON.parse(text);}catch{throw new Error(`Expected JSON from ${url}`);}}
    function normalizeItem(it){const title=it.title||it.name||it.filename||it.original||it.sanitized||"(untitled)"; const category=it.category||'other'; const type=it.subcategory||it.type||it.item_type||''; let img=it.image_url||it.r2_url||it.image||''; if(!img&&it.path) img=`${R2_PUBLIC_DEV_BASE}/${encodeURI(it.path).replaceAll('#','%23')}`; return {title,category,type,img,amazon:it.amazon_url||amazonSearchUrl(it.amazon_query||title),qty_on_hand:it.qty_on_hand??null,unit_label:it.unit_label||'',rating_value:it.rating_value??null,rating_count:Number(it.rating_count||0),vendor:it.preferred_vendor||it.brand_guess||it.manufacturer||'', vendorTag:(it.preferred_vendor||it.brand_guess||it.manufacturer)?('#'+String(it.preferred_vendor||it.brand_guess||it.manufacturer).replace(/[^A-Za-z0-9]+/g,'').trim()):'',sort_key:Number(it.sort_key||0),notes:it.notes||it.description||'',bytes:Number(it.bytes||0)}; }
    function hardenTextInput(el){ if(!el) return; const wipe=()=>{ if(/@/.test(el.value||'')) el.value=''; }; const unlock=()=>{ el.removeAttribute('readonly'); wipe(); }; el.value=''; el.setAttribute('autocomplete','new-password'); el.setAttribute('autocapitalize','none'); el.setAttribute('autocorrect','off'); el.setAttribute('spellcheck','false'); el.setAttribute('data-lpignore','true'); el.setAttribute('data-1p-ignore','true'); el.setAttribute('data-form-type','other'); setTimeout(wipe,25); setTimeout(wipe,250); window.addEventListener('pageshow', wipe); el.addEventListener('focus', unlock, { once:true }); el.addEventListener('pointerdown', unlock, { once:true }); el.addEventListener('input', wipe); el.addEventListener('keydown', wipe); }
    function fillSelect(id, values, label){ const sel=qs(id); const list=[...new Set(values.filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b))); sel.innerHTML=`<option value="">All ${label}</option>`+list.map(v=>`<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join(''); }
    function render(list){ const q=(qs('#q').value||'').trim().toLowerCase(); const cat=qs('#cat').value||''; const type=qs('#typeFilter').value||''; const mode=qs('#sort').value; let out=list.filter(it=>(!cat||it.category===cat)&&(!type||it.type===type)&&(!q||`${it.title} ${it.category} ${it.type} ${it.vendor} ${it.notes}`.toLowerCase().includes(q))); out=[...out]; if(mode==='title_asc') out.sort((a,b)=>a.title.localeCompare(b.title)); if(mode==='title_desc') out.sort((a,b)=>b.title.localeCompare(a.title)); if(mode==='category_asc') out.sort((a,b)=>(a.category||'').localeCompare(b.category||'')||(a.type||'').localeCompare(b.type||'')||a.title.localeCompare(b.title)); if(mode==='stock_desc') out.sort((a,b)=>Number(b.qty_on_hand||0)-Number(a.qty_on_hand||0)); if(mode==='stock_asc') out.sort((a,b)=>Number(a.qty_on_hand||0)-Number(b.qty_on_hand||0)); if(mode==='rating_desc') out.sort((a,b)=>Number(b.rating_value||0)-Number(a.rating_value||0)); if(mode==='vendor_asc') out.sort((a,b)=>(a.vendor||'').localeCompare(b.vendor||'')||a.title.localeCompare(b.title)); if(mode==='custom_asc') out.sort((a,b)=>Number(a.sort_key||0)-Number(b.sort_key||0)||a.title.localeCompare(b.title)); qs('#status').style.display='block'; qs('#status').className='notice'; qs('#status').textContent=`Showing ${out.length} consumables`; const grid=qs('#grid'); grid.innerHTML=out.map(it=>`<div class="panel">${it.img?`<img class="cardImg" alt="${escapeHtml(it.title)}" src="${escapeHtml(it.img)}" loading="lazy" decoding="async" onerror="this.style.display='none'" />`:''}<div style="margin-top:${it.img?'10px':'0'}"><div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap"><div><h2 style="margin:0;font-size:1.1rem">${escapeHtml(it.title)}</h2><div class="muted mini">${escapeHtml(it.category)}</div></div><div class="row"><span class="tag">${escapeHtml(it.category)}</span>${it.type?`<span class="tag">${escapeHtml(it.type)}</span>`:''}</div></div>${it.vendor?`<div class="muted mini" style="margin-top:4px">Manufacturer: ${escapeHtml(it.vendor)} ${it.vendorTag?`<span class=\"tag\" style=\"margin-left:6px\">${escapeHtml(it.vendorTag)}</span>`:''}</div>`:''}${it.notes?`<div class="muted mini" style="margin-top:6px">${escapeHtml(it.notes)}</div>`:''}${it.rating_value!=null?`<div class="muted mini" style="margin-top:6px">Rated ${escapeHtml(Number(it.rating_value).toFixed(1))}/5${it.rating_count?` from ${escapeHtml(it.rating_count)}`:''}</div>`:''}${it.qty_on_hand!=null?`<div class="muted mini" style="margin-top:4px">Stock: ${escapeHtml(it.qty_on_hand)} ${escapeHtml(it.unit_label||'')}</div>`:''}<div class="row" style="margin-top:12px"><a class="btn primary" href="${escapeHtml(it.amazon)}" target="_blank" rel="noopener">Amazon search</a></div></div></div>`).join('') || '<div class="notice warn">No consumables match the current filters.</div>'; }
    async function loadCatalog(){ try{const dbRes=await fetch(DB_URL,{cache:'no-store'}); const dbJson=await dbRes.json(); if(dbRes.ok&&dbJson?.ok&&Array.isArray(dbJson.items)&&dbJson.items.length) return dbJson.items;}catch{} let lastErr=null; for(const u of CANDIDATE_JSON){ try{const d=await fetchJsonStrict(`${u}?v=${Date.now()}`); if(Array.isArray(d)&&d.length) return d;}catch(e){lastErr=e;} } throw lastErr||new Error('No JSON source worked.'); }
    hardenTextInput(qs('#q'));
    try{ const raw=await loadCatalog(); const list=raw.map(normalizeItem).filter(x=>x.title); fillSelect('#cat', list.map(x=>x.category), 'categories'); fillSelect('#typeFilter', list.map(x=>x.type), 'types'); render(list); ['q','cat','typeFilter','sort'].forEach(id=>qs('#'+id).addEventListener(id==='q'?'input':'change',()=>render(list))); qs('#clearBtn').addEventListener('click',()=>{qs('#q').value='';qs('#cat').value='';qs('#typeFilter').value='';qs('#sort').value='title_asc';render(list);}); }catch(e){ qs('#status').style.display='block'; qs('#status').className='notice bad'; qs('#status').textContent=`Consumables catalog failed to load: ${e.message||e}`; qs('#grid').innerHTML='<div class="notice bad">Upload a valid products catalog JSON or restore the public DB inventory feed.</div>'; }
  </script>
  <script type="module" src="/assets/chrome.js?v=20260326d"></script>
</body>
</html>
