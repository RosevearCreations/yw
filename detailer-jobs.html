<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Detailer Jobs | Rosie Dazzlers</title><meta name="robots" content="noindex,nofollow"/><link rel="stylesheet" href="/assets/site.css"/><style>.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.stack{display:grid;gap:12px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}@media(max-width:980px){.grid2{grid-template-columns:1fr}}</style></head><body><div class="nav"><div class="nav-inner"><a class="brand" href="/"><img data-logo alt="Rosie Dazzlers logo"/><strong>Rosie Dazzlers Detailer</strong></a><button class="btn small ghost nav-toggle" id="navToggle" type="button" aria-expanded="false">Menu</button><div class="nav-links" id="navLinks"></div></div></div><main class="container"><section class="panel"><h1 style="margin:0 0 6px">Assigned jobs</h1><p class="kicker" style="margin:0">Accept, decline, dispatch, pause, resume, and complete your assigned detailing jobs.</p><div id="status" class="notice" style="display:none;margin-top:12px"></div></section><section class="section grid2"><article class="panel stack"><div class="row"><button class="btn ghost" id="reloadBtn" type="button">Reload jobs</button><select id="jobFilter"><option value="">All job statuses</option><option value="scheduled">Scheduled</option><option value="in_progress">In progress</option><option value="completed">Completed</option></select></div><div id="actorBox" class="notice">Checking signed-in staff session…</div><div id="jobsBox" class="stack"></div></article><article class="panel stack"><h2 style="margin:0">Selected job workflow</h2><div id="jobMeta" class="kicker">Choose a job to manage its workflow.</div><div class="row"><button class="btn ghost" data-action="accept">Accept</button><button class="btn ghost" data-action="decline">Decline</button><button class="btn ghost" data-action="dispatch">On my way</button><button class="btn ghost" data-action="arrive">Arrived</button><button class="btn ghost" data-action="start">Start detailing</button><button class="btn ghost" data-action="pause">Pause</button><button class="btn ghost" data-action="resume">Resume</button><button class="btn primary" data-action="complete">Complete & bill</button></div><label>Reason / note<input id="reason" placeholder="Required when declining or pausing, optional otherwise"/></label><div class="row"><a class="btn ghost" id="openProgressLink" href="#">Open progress screen</a><a class="btn ghost" id="openCustomerLink" href="#">Open customer feed</a></div><div class="hr"></div><h3 style="margin:0">Post a job note</h3><label>Note visibility<select id="noteVisibility"><option value="customer">Customer-visible update</option><option value="internal">Internal staff note</option></select></label><label>Job note<textarea id="jobNote" rows="4" placeholder="Share a live update for the customer or leave an internal note for admins/detailers."></textarea></label><div><button class="btn primary" id="postNoteBtn" type="button">Post note</button></div></article></section></main><footer class="footer container" data-footer></footer><script src="/assets/admin-auth.js"></script><script src="/assets/admin-shell.js"></script><script src="/assets/chrome.js"></script><script>(function(){const qs=s=>document.querySelector(s);let actor=null, jobs=[], current=null;function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}function show(msg,kind=''){const el=qs('#status');el.style.display='block';el.className='notice '+(kind||'');el.textContent=msg;}async function loadJobs(){const f=qs('#jobFilter').value;const res=await fetch('/api/detailer/jobs'+(f?`?job_status=${encodeURIComponent(f)}`:''),{credentials:'include',cache:'no-store'});const out=await res.json().catch(()=>({}));if(!res.ok||!out.ok){show(out.error||'Could not load jobs.','bad');return;}actor=out.actor||actor;jobs=Array.isArray(out.jobs)?out.jobs:[];qs('#actorBox').textContent=actor?`Signed in as ${actor.full_name||actor.email||'staff'} (${actor.role_code||'staff'})`:'No staff session';const box=qs('#jobsBox');box.innerHTML=jobs.length?jobs.map(job=>`<button class="panel stack" type="button" data-booking="${esc(job.id)}"><strong>${esc(job.customer_name||'Customer')}</strong><span class="kicker">${esc(job.service_date||'')} · ${esc(job.start_slot||'')} · ${esc(job.package_code||'')}</span><span class="kicker">Response: ${esc(job.detailer_response_status||'pending')} · Stage: ${esc(job.current_workflow_stage||job.job_status||'pending')}</span></button>`).join(''):'<div class="notice">No assigned jobs yet.</div>';box.querySelectorAll('[data-booking]').forEach(btn=>btn.addEventListener('click',()=>selectJob(btn.dataset.booking)));}function selectJob(id){current=jobs.find(j=>j.id===id)||null;qs('#jobMeta').innerHTML=current?`<strong>${esc(current.customer_name||'Customer')}</strong><br>${esc(current.service_date||'')} · ${esc(current.start_slot||'')} · ${esc(current.package_code||'')}<br>Stage: ${esc(current.current_workflow_stage||current.job_status||'pending')}`:'Choose a job';qs('#openProgressLink').href=current?`/admin-progress.html?booking_id=${encodeURIComponent(current.id)}`:'#';qs('#openCustomerLink').href=current&&current.progress_token?`/progress.html?token=${encodeURIComponent(current.progress_token)}`:'#';}async function runAction(action){if(!current)return show('Choose a job first.','bad');const reason=qs('#reason').value.trim();const res=await fetch('/api/detailer/job_action',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({booking_id:current.id,action,reason})});const out=await res.json().catch(()=>({}));if(!res.ok||!out.ok)return show(out.error||'Could not update workflow.','bad');show(`Job updated: ${action}.`,'ok');await loadJobs();selectJob(current.id);}qs('#reloadBtn').addEventListener('click',loadJobs);qs('#jobFilter').addEventListener('change',loadJobs);document.querySelectorAll('[data-action]').forEach(btn=>btn.addEventListener('click',()=>runAction(btn.dataset.action)));async function postJobNote(){ if(!current) return show('Choose a job first.','bad'); const note=(qs('#jobNote').value||'').trim(); const visibility=(qs('#noteVisibility').value||'customer').trim(); if(!note) return show('Enter a note first.','bad'); const res=await fetch('/api/detailer/job_note_post',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({booking_id:current.id,note,visibility})}); const out=await res.json().catch(()=>({})); if(!res.ok||!out.ok) return show(out.error||'Could not post note.','bad'); qs('#jobNote').value=''; show(visibility==='internal'?'Internal note posted.':'Customer update posted.','ok'); await loadJobs(); selectJob(current.id);} qs('#postNoteBtn').addEventListener('click',postJobNote); window.AdminShell.boot({pageKey:'progress', onReady: async ({actor:currentActor})=>{actor=currentActor||null; await loadJobs();}});})();</script></body></html>
