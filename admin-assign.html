<!-- /admin-assign.html
     REPLACE ENTIRE FILE

     Purpose:
     - Assign a staff name to a booking (simple version)
     - Lists upcoming bookings and lets you set "assigned_to"
     - Calls: POST /api/admin/assign_booking  (we create next)
     - Loads bookings via: POST /api/admin/bookings (action=list)

     Notes:
     - This does not require a full staff system yet.
     - Later we can add staff accounts + permissions.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Assign | Rosie Dazzlers</title>
  <meta name="description" content="Assign staff to bookings." />
  <link rel="stylesheet" href="/assets/site.css?v=20260311s" />
  <style>
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:980px){ .grid2{grid-template-columns:1fr} }
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .muted{color:rgba(234,242,255,.62)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.10);vertical-align:top}
    th{color:rgba(234,242,255,.70);font-weight:600;text-align:left}
    .mini{font-size:.92rem}
    pre{white-space:pre-wrap;word-break:break-word;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:10px}
    input.small{padding:10px 10px}
  </style>
</head>

<body>
  <div class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <img data-logo alt="Rosie Dazzlers logo" />
        <strong>Rosie Dazzlers</strong>
      </a>
      <button class="btn small ghost nav-toggle" id="navToggle" type="button" aria-expanded="false">Menu</button>
      <div class="nav-links" id="navLinks"></div>
      <a class="btn primary" href="/admin">Admin</a>
    </div>
  </div>

  <div class="container">
    <div class="panel">
      <h1 style="margin:0 0 6px">Assign Staff</h1>
      <p class="kicker" style="margin:0">Assign a staff name to each booking (simple approach for now).</p>

      <div class="hr"></div>

      <div class="row">
        <label style="display:flex;flex-direction:column;gap:6px;min-width:260px">
          <span class="muted">Admin password</span>
          <input id="pw" type="password" placeholder="Enter admin password…" />
        </label>

        <div class="row" style="align-items:flex-end">
          <button class="btn ghost" id="savePwBtn" type="button">Save password</button>
          <button class="btn primary" id="loadBtn" type="button">Load bookings</button>
          <a class="btn ghost" href="/admin">Back</a>
        </div>
      </div>

      <div id="status" class="notice" style="display:none;margin-top:12px"></div>
    </div>

    <div class="section">
      <div class="panel">
        <h2 style="margin-top:0">Upcoming bookings</h2>
        <div class="muted mini" id="count"></div>
        <div class="hr"></div>

        <div style="overflow:auto">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Slot</th>
                <th>Customer</th>
                <th>Package</th>
                <th>Assigned to</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="rows">
              <tr><td colspan="6" class="muted">Load bookings…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="panel">
        <h2 style="margin-top:0">Raw</h2>
        <pre id="raw" class="mono">{}</pre>
      </div>
    </div>

    <div class="footer" data-footer></div>
  </div>

  <script type="module">
    const qs = (s)=>document.querySelector(s);

    function show(msg, kind=""){
      const el = qs("#status");
      el.style.display = "block";
      el.className = "notice " + (kind || "");
      el.textContent = msg;
    }
    function hide(){ qs("#status").style.display = "none"; }

    function getPw(){ return (qs("#pw").value || "").trim(); }

    async function postJson(url, payload){
      const res = await fetch(url, {
        method: "POST",
        headers: { "content-type":"application/json" },
        body: JSON.stringify(payload),
      });
      const out = await res.json().catch(()=>null);
      return { ok: res.ok, status: res.status, out };
    }

    function esc(s){
      return String(s||"")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#39;");
    }

    // Save PW
    try {
      const saved = localStorage.getItem("rosie_admin_pw") || "";
      if (saved) qs("#pw").value = saved;
    } catch {}

    qs("#savePwBtn").addEventListener("click", () => {
      const pw = getPw();
      if (!pw) return show("Enter password first.", "bad");
      try {
        localStorage.setItem("rosie_admin_pw", pw);
        show("Saved password on this device.", "ok");
        setTimeout(hide, 1000);
      } catch {
        show("Could not save password.", "bad");
      }
    });

    async function loadBookings(){
      hide();
      const pw = getPw();
      if (!pw) return show("Missing admin password.", "bad");

      // next 21 days
      const from = new Date();
      const to = new Date(from.getTime() + 1000*60*60*24*21);
      const ymd = (d)=> d.toISOString().slice(0,10);

      qs("#loadBtn").disabled = true;
      qs("#loadBtn").textContent = "Loading…";

      const r = await postJson("/api/admin/bookings", {
        admin_password: pw,
        action: "list",
        date_from: ymd(from),
        date_to: ymd(to),
        statuses: ["pending","confirmed","completed"],
      });

      qs("#loadBtn").disabled = false;
      qs("#loadBtn").textContent = "Load bookings";

      qs("#raw").textContent = JSON.stringify(r.out || {}, null, 2);

      if (!r.ok || !r.out?.ok){
        return show(r.out?.error ? `Error: ${r.out.error}` : `Error (HTTP ${r.status})`, "bad");
      }

      const rows = Array.isArray(r.out.rows) ? r.out.rows : [];
      qs("#count").textContent = `${rows.length} bookings`;

      const tb = qs("#rows");
      tb.innerHTML = "";

      for (const b of rows){
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="mono">${esc(b.service_date)}</td>
          <td class="mono">${esc(b.start_slot)}${Number(b.duration_slots)===2 ? "+PM" : ""}</td>
          <td>
            <div><strong>${esc(b.customer_name)}</strong></div>
            <div class="muted mini">${esc(b.customer_email || "")}</div>
          </td>
          <td class="mono">${esc(b.package_code)}/${esc(b.vehicle_size)}</td>
          <td>
            <input class="small" data-assign-input value="${esc(b.assigned_to || "")}" placeholder="Name (e.g., Laurie)" />
          </td>
          <td>
            <button class="btn ghost" data-save="${esc(b.id)}">Save</button>
          </td>
        `;
        tb.appendChild(tr);
      }

      tb.querySelectorAll("button[data-save]").forEach(btn=>{
        btn.addEventListener("click", async ()=>{
          const pw2 = getPw();
          if (!pw2) return show("Missing admin password.", "bad");

          const booking_id = btn.getAttribute("data-save");
          const input = btn.closest("tr").querySelector("input[data-assign-input]");
          const assigned_to = (input.value || "").trim();

          btn.disabled = true;

          const r2 = await postJson("/api/admin/assign_booking", {
            admin_password: pw2,
            booking_id,
            assigned_to
          });

          btn.disabled = false;

          qs("#raw").textContent = JSON.stringify(r2.out || {}, null, 2);

          if (!r2.ok || !r2.out?.ok){
            return show(r2.out?.error ? `Error: ${r2.out.error}` : `Error (HTTP ${r2.status})`, "bad");
          }

          show("Saved.", "ok");
          setTimeout(hide, 800);
        });
      });

      show("Loaded.", "ok");
      setTimeout(hide, 800);
    }

    qs("#loadBtn").addEventListener("click", loadBookings);
  </script>

  <script type="module" src="/assets/chrome.js?v=20260311s"></script>
</body>
</html>
